<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KROOKZMANE's stuff</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
.win10-tile {
  border-radius: 0px;
  outline: 2px solid transparent;
  outline-offset: -2px;
  transition: transform 0.1s ease-out, outline 0.2s ease;
}
.win10-tile:hover { outline: 2px solid rgba(255,255,255,0.3); }
.win10-tile:active { transform: scale(0.96); }
.win10-tile::before {
  content: "";
  position: absolute; top:0; left:0; right:0; bottom:0;
  background: radial-gradient(300px circle at var(--mouse-x,0) var(--mouse-y,0), rgba(255,255,255,0.2), transparent 40%);
  z-index: 10; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
}
.win10-tile:hover::before { opacity: 1; }
.custom-scrollbar::-webkit-scrollbar { width: 8px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6a6a6a; }
.tooltip-popup {
  position: fixed; z-index: 999; background: #1f1f1f; border: 1px solid rgba(255,255,255,0.15);
  color: white; padding: 10px 14px; border-radius: 4px; font-size: 12px; max-width: 260px;
  line-height: 1.5; pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  opacity: 0; transition: opacity 0.15s ease;
}
.tooltip-popup.visible { opacity: 1; }
</style>
</head>
<body class="min-h-screen bg-cover bg-center text-white overflow-hidden flex" style="background-image: url('https://i.redd.it/uupgpb1k3ty11.jpg')">

<div class="w-full h-screen bg-[#1f1f1f]/85 backdrop-blur-xl shadow-2xl overflow-y-auto overflow-x-hidden custom-scrollbar">
  <header class="pt-10 pb-4 px-10 sticky top-0 bg-[#1f1f1f]/95 backdrop-blur-2xl z-50">
    <div class="flex items-center gap-3 mb-8">
      <i data-lucide="layout-grid" class="w-6 h-6 text-white" stroke-width="1.5"></i>
      <h1 class="text-2xl font-light tracking-wide">Start</h1>
    </div>
    <nav id="nav-tabs" class="flex gap-6 overflow-x-auto pb-2 custom-scrollbar"></nav>
  </header>
  <main class="px-10 mt-6 pb-16">
    <div id="tile-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 2xl:grid-cols-12 gap-1 auto-rows-[100px]"></div>
  </main>
</div>

<div id="tooltip" class="tooltip-popup"></div>

<script>
const TABS = ['Music Zone', 'Nerd Zone', 'Audio Zone', 'Community Zone'];

const TILES = [
  // MUSIC ZONE
  { id: 'm1', zone: 'Music Zone', title: 'Spotify', size: '2x2', color: 'bg-[#1DB954]', brandIcon: 'spotify', url: 'https://open.spotify.com/intl-fr/artist/0tasVIWMG2VzVLTAmW7NyX' },
  { id: 'm2', zone: 'Music Zone', title: 'YouTube Music', size: '2x2', color: 'bg-[#000000]', brandIcon: 'youtubemusic', url: 'https://music.youtube.com/channel/UCV0liutEh3f09XfEi_2tCxg' },
  { id: 'm3', zone: 'Music Zone', title: 'YouTube', size: '2x2', color: 'bg-[#FF0000]', brandIcon: 'youtube', url: 'https://www.youtube.com/@KROOKZ-MANE' },
  { id: 'm4', zone: 'Music Zone', title: 'Deezer', size: '2x2', color: 'bg-[#A238FF]', brandIcon: 'deezer', url: 'https://www.deezer.com/fr/artist/274310481' },
  { id: 'm6', zone: 'Music Zone', title: 'SoundCloud', size: '2x2', color: 'bg-[#FF3300]', brandIcon: 'soundcloud', url: 'https://soundcloud.com/krookzmane' },
  { id: 'm7', zone: 'Music Zone', title: 'Studio', size: '2x2', color: 'bg-[#0078D7]', lucideIcon: 'sliders-horizontal', desc: 'Main DAW : Ableton Live 12. Secondary DAW (for collabs) : FL Studio 2025' },

  // NERD ZONE
  { id: 'n1', zone: 'Nerd Zone', title: 'Erazer Crawler E30e', size: '2x2', color: 'bg-[#2D2D30]', image: 'https://www.laptopspirit.fr/comparateur/images/fiches/3/G-37681-1-Medion-Erazer-Crawler-E30-(MD62472)-1.jpg', desc: 'Intel Core i5 / NVIDIA RTX / 24GB RAM / 512GB + 256GB + 1TB SSDs.' },
  { id: 'n2', zone: 'Nerd Zone', title: 'Redmi Note 10S', size: '2x2', color: 'bg-[#2D2D30]', image: 'https://m.media-amazon.com/images/I/51g+l3guchL.jpg', desc: 'MediaTek Helio G95 / 6.43" AMOLED / 5000mAh. OS: LineageOS 23.2' },
  { id: 'n3', zone: 'Nerd Zone', title: 'Mi Smart Clock', size: '2x2', color: 'bg-[#2D2D30]', image: 'https://preview.redd.it/hacked-my-xiaomi-mi-smart-clock-into-a-home-assistant-v0-z5qvaoewbfmd1.jpeg?width=4032&format=pjpg&auto=webp&s=9d7a1a58c8f4b930304aaf5a1625126b0f65c452', desc: '4" Touch Display / 1GB RAM / 4GB Storage. Mod: LineageOS' },
  { id: 'n4', zone: 'Nerd Zone', title: 'Raspberry Pi 5', size: '2x2', color: 'bg-[#C51A4A]', image: 'https://m.media-amazon.com/images/I/81XB4LUuFOL.jpg', desc: 'Broadcom BCM2712 / Cortex-A76 @ 2.4GHz / 8GB RAM' },
  { id: 'n5', zone: 'Nerd Zone', title: 'GitHub', size: '2x2', color: 'bg-[#181717]', brandIcon: 'github', desc: 'Repositories, projects & open-source code.', url: 'https://github.com/krookzmane' },

  // AUDIO ZONE
  { id: 'a1', zone: 'Audio Zone', title: 'JBL GO2 (x2)', size: '2x2', color: 'bg-[#FF4500]', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhUT5Xi_cTeCatf7BuLHoK3eFwAjYVD6hSSw&s' },
  { id: 'a3', zone: 'Audio Zone', title: 'JBL GO2+', size: '2x2', color: 'bg-[#FF4500]', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhUT5Xi_cTeCatf7BuLHoK3eFwAjYVD6hSSw&s' },
  { id: 'a4', zone: 'Audio Zone', title: 'JBL GO4', size: '2x2', color: 'bg-[#FF4500]', image: 'https://m.media-amazon.com/images/I/71HdLDJEEUL.jpg' },
  { id: 'a5', zone: 'Audio Zone', title: 'JBL Clip 4', size: '2x2', color: 'bg-[#FF4500]', image: 'https://fr.jbl.com/dw/image/v2/BFND_PRD/on/demandware.static/-/Sites-masterCatalog_Harman/default/dw4ebe84d6/JBL_CLIP4_HERO_STANDARD_TRIPLE_BLACK_0737_x1.png?sw=680&sh=680' },
  { id: 'a6', zone: 'Audio Zone', title: 'Partybox Encore', size: '2x2', color: 'bg-[#2D2D30]', image: 'https://m.media-amazon.com/images/I/81lQ8o4eQZL.jpg' },
  { id: 'a7', zone: 'Audio Zone', title: 'JBL TUNE 510BT', size: '2x2', color: 'bg-[#0078D7]', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNyL7wmbSd--zo8_GSoBNRz7tZwrfbZs030w&s' },
  { id: 'a8', zone: 'Audio Zone', title: 'ATH-M30X', size: '2x2', color: 'bg-[#2D2D30]', image: 'https://www.audio-technica.com/media/catalog/product/a/t/ath-m30x_01.png' },

  // COMMUNITY ZONE
  { id: 'c1', zone: 'Community Zone', title: 'Discord', size: '2x2', color: 'bg-[#5865F2]', brandIcon: 'discord', url: 'https://discord.com', desc: 'Rejoins le serveur communautaire.' },
  { id: 'c2', zone: 'Community Zone', title: 'Instagram', size: '1x1', color: 'bg-[#E4405F]', brandIcon: 'instagram', url: 'https://www.instagram.com/krookz.mane/' },
  { id: 'c3', zone: 'Community Zone', title: 'TikTok', size: '1x1', color: 'bg-[#010101]', brandIcon: 'tiktok', url: 'https://www.tiktok.com/@krookzmanee' },
];

let activeTab = 'Music Zone';
const sizeClassesMap = {
  '1x1': 'col-span-1 row-span-1',
  '2x1': 'col-span-2 row-span-1',
  '2x2': 'col-span-2 row-span-2'
};

const navContainer = document.getElementById('nav-tabs');
const gridContainer = document.getElementById('tile-grid');
const tooltip = document.getElementById('tooltip');

function renderTabs() {
  navContainer.innerHTML = '';
  TABS.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = `text-sm font-semibold tracking-wide transition-all whitespace-nowrap pb-1 ${
      activeTab === tab ? 'text-white border-b-[3px] border-[#0078D7]' : 'text-gray-400 hover:text-white'
    }`;
    btn.textContent = tab.toUpperCase();
    btn.onclick = () => { activeTab = tab; renderTabs(); renderTiles(); };
    navContainer.appendChild(btn);
  });
}

function renderTiles() {
  gridContainer.innerHTML = '';
  const filteredTiles = TILES.filter(t => t.zone === activeTab);

  filteredTiles.forEach(tile => {
    const sizeClass = sizeClassesMap[tile.size];
    const isLink = !!tile.url;
    const Tag = isLink ? 'a' : 'div';
    const attrs = isLink ? `href="${tile.url}" target="_blank" rel="noopener noreferrer"` : '';
    const cursorClass = isLink ? 'cursor-pointer' : (tile.desc ? 'cursor-help' : 'cursor-default');

    let bgHTML = '';
    if (tile.image) {
      bgHTML = `
        <img src="${tile.image}" alt="${tile.title}" class="absolute inset-0 w-full h-full object-cover" draggable="false" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent pointer-events-none"></div>
      `;
    }

    let iconHTML = '';
    if (!tile.image) {
      const is1x1 = tile.size === '1x1';
      const iconWrapperClass = `flex flex-1 ${is1x1 ? 'justify-center items-center' : 'justify-center items-center pb-6'}`;
      if (tile.brandIcon) {
        const iconSize = is1x1 ? 'w-7 h-7' : 'w-12 h-12';
        iconHTML = `<div class="${iconWrapperClass}">
          <img src="https://cdn.simpleicons.org/${tile.brandIcon}/white" alt="${tile.title}" class="pointer-events-none drop-shadow-sm ${iconSize}" draggable="false" />
        </div>`;
      } else if (tile.lucideIcon) {
        const iconSize = is1x1 ? 'w-8 h-8' : 'w-10 h-10';
        iconHTML = `<div class="${iconWrapperClass}">
          <i data-lucide="${tile.lucideIcon}" class="text-white/95 pointer-events-none drop-shadow-sm ${iconSize}" stroke-width="1"></i>
        </div>`;
      }
    }

    let textHTML = '';
    if (tile.size === '1x1') {
      textHTML = `<div class="absolute bottom-1 left-1 right-1 text-center">
        <p class="text-[9px] font-semibold text-white/80 tracking-wide truncate uppercase">${tile.title}</p>
      </div>`;
    } else {
      const shadowClass = tile.image ? 'drop-shadow-md' : '';
      let descHTML = '';
      if (tile.desc) {
        const descColor = tile.image ? 'text-white/90 drop-shadow-md' : 'text-white/70';
        descHTML = `<p class="text-[11px] mt-0.5 line-clamp-2 leading-tight ${descColor}">${tile.desc}</p>`;
      }
      textHTML = `<div class="absolute bottom-2 left-3 right-3 text-left">
        <h3 class="font-semibold text-white text-xs tracking-wide truncate ${shadowClass}">${tile.title}</h3>
        ${descHTML}
      </div>`;
    }

    const tileHTML = `
      <${Tag} ${attrs} class="win10-tile group relative overflow-hidden ${sizeClass} ${tile.color} ${cursorClass}"
        ${tile.desc && !isLink ? `data-tooltip="${tile.desc.replace(/"/g, '&quot;')}"` : ''}>
        ${bgHTML}
        <div class="z-20 relative h-full flex flex-col justify-between p-3 select-none">
          ${iconHTML}
          ${textHTML}
        </div>
      </${Tag}>
    `;

    gridContainer.insertAdjacentHTML('beforeend', tileHTML);
  });

  lucide.createIcons();
  bindTooltips();
}

function bindTooltips() {
  gridContainer.querySelectorAll('[data-tooltip]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      tooltip.textContent = el.dataset.tooltip;
      tooltip.classList.add('visible');
    });
    el.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    el.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  });
}

gridContainer.addEventListener('mousemove', (e) => {
  gridContainer.querySelectorAll('.win10-tile').forEach(card => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
    card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
  });
});

renderTabs();
renderTiles();
lucide.createIcons();
</script>
</body>
</html>
